<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보드게임 취향 기록장</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f2ea;
      --panel: #fffaf0;
      --panel-2: #fff3dc;
      --card: #ffffff;
      --card-hover: #fff8e8;
      --input: #ffffff;
      --text: #25212c;
      --soft: #4f4a5d;
      --muted: #716a7e;
      --line: rgba(37, 33, 44, 0.16);
      --line-soft: rgba(37, 33, 44, 0.10);
      --red: #ff5b5f;
      --blue: #2d9cdb;
      --yellow: #ffd166;
      --green: #35b66f;
      --purple: #8b5cf6;
      --red-soft: #8e2b30;
      --shadow: rgba(70, 45, 20, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 34px 18px 108px;
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 91, 95, 0.18), transparent 28%),
        radial-gradient(circle at 88% 10%, rgba(45, 156, 219, 0.16), transparent 26%),
        radial-gradient(circle at 50% 96%, rgba(255, 209, 102, 0.24), transparent 30%),
        linear-gradient(135deg, #fff7e8 0%, #f4efe7 52%, #eaf4ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(37,33,44,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,33,44,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 82%);
    }

    .container {
      position: relative;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px;
      border-radius: 28px;
      background: linear-gradient(180deg, #fffdf8, #fff4df);
      border: 1px solid var(--line);
      box-shadow: 0 26px 70px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.72);
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 96% 8%, rgba(255, 209, 102, 0.22), transparent 18%),
        linear-gradient(135deg, rgba(255, 91, 95, 0.08), transparent 34%);
    }

    .container::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--red), var(--yellow), var(--blue), transparent);
      opacity: 0.85;
    }

    .content { position: relative; z-index: 1; }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: start;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line-soft);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 91, 95, 0.13);
      color: var(--red-soft);
      border: 1px solid rgba(255, 91, 95, 0.28);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.10em;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 10px rgba(255, 91, 95, 0.45);
    }

    h1 {
      margin: 0 0 14px;
      color: var(--text);
      font-size: clamp(38px, 6vw, 64px);
      line-height: 0.98;
      letter-spacing: -0.075em;
      font-weight: 1000;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #25212c, #5d506d 48%, #ff5b5f);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .desc {
      max-width: 690px;
      margin: 0;
      color: var(--soft);
      font-size: 16px;
      line-height: 1.75;
    }

    .stamp {
      width: 138px;
      height: 138px;
      border-radius: 32px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--text);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.52) 0 7%, transparent 8%),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.52) 0 7%, transparent 8%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.52) 0 7%, transparent 8%),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,0.52) 0 7%, transparent 8%),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,0.52) 0 7%, transparent 8%),
        linear-gradient(145deg, #ff6b73, #d93d47);
      border: 1px solid var(--line);
      font-weight: 950;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.38), 0 18px 38px rgba(255, 91, 95, 0.18);
      transform: rotate(3deg);
    }

    .stamp strong {
      display: block;
      font-size: 40px;
      line-height: 1;
      color: #fffaf0;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.10);
    }

    .stamp span {
      display: block;
      margin-top: 7px;
      color: #fffaf0;
      font-size: 11px;
      letter-spacing: 0.16em;
    }

    .guide,
    .game-name {
      margin-bottom: 22px;
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, #fff8e8, #fff1d6);
      border: 1px solid var(--line);
      color: var(--soft);
      line-height: 1.7;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78);
    }

    .guide strong { color: var(--text); }

    label {
      display: block;
      margin-bottom: 9px;
      color: var(--text);
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid rgba(37,33,44,0.20);
      border-radius: 14px;
      outline: none;
      background: var(--input);
      color: var(--text);
      font-size: 16px;
      transition: 0.18s;
    }

    input[type="text"]::placeholder { color: rgba(79, 74, 93, 0.55); }
    input[type="text"]:focus {
      border-color: rgba(255, 77, 87, 0.82);
      box-shadow: 0 0 0 4px rgba(255, 77, 87, 0.12);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .field {
      position: relative;
      min-height: 178px;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, var(--card), #fff7e8);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 12px 26px rgba(70,45,20,0.10);
      overflow: hidden;
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
    }

    .field::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 7px;
      height: 100%;
      background: linear-gradient(180deg, var(--red), var(--yellow), var(--blue));
      opacity: 0.95;
    }

    .field::after {
      content: "♟";
      position: absolute;
      right: 16px;
      top: 12px;
      color: rgba(37,33,44,0.10);
      font-size: 42px;
      line-height: 1;
    }

    .field:hover {
      transform: translateY(-3px) rotate(-0.35deg);
      border-color: rgba(255, 209, 102, 0.55);
      background: linear-gradient(180deg, var(--card-hover), #fff2d9);
    }

    .field-head {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .field-head label { margin: 0; padding-right: 8px; }

    .field small {
      position: relative;
      z-index: 1;
      display: block;
      min-height: 44px;
      margin-top: 9px;
      color: var(--muted);
      line-height: 1.58;
      font-size: 14px;
      font-weight: 600;
    }

    .score-preview {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      color: #171725;
      background: linear-gradient(135deg, var(--yellow), #ffe39a);
      border: 1px solid rgba(255, 255, 255, 0.38);
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(255, 209, 102, 0.12);
    }

    .score-preview::before { content: "🎲"; font-size: 13px; }

    .toggle-wrap {
      position: relative;
      z-index: 1;
      margin-top: 16px;
    }

    .toggle-labels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 8px;
      padding: 0 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      line-height: 1.15;
    }

    .toggle-control {
      --pos: 4;
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      min-height: 48px;
      padding: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(37,33,44,0.14);
      box-shadow: inset 0 1px 4px rgba(70,45,20,0.10);
      overflow: hidden;
    }

    .toggle-control::before {
      content: "";
      position: absolute;
      top: 5px;
      bottom: 5px;
      left: calc(5px + ((100% - 10px) / 5) * var(--pos));
      width: calc((100% - 10px) / 5);
      border-radius: 999px;
      background: linear-gradient(135deg, var(--yellow), #ffb66b 52%, #ff7d7f);
      box-shadow: 0 10px 20px rgba(255, 91, 95, 0.18), inset 0 1px 0 rgba(255,255,255,0.45);
      transition: left 0.18s ease;
    }

    .toggle-option {
      position: relative;
      z-index: 1;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--soft);
      font-size: 13px;
      font-weight: 1000;
      cursor: pointer;
      min-width: 0;
      padding: 0;
      transition: color 0.16s ease, transform 0.16s ease;
    }

    .toggle-option:hover { transform: translateY(-1px); }
    .toggle-option.active { color: #171725; }

    .toggle-current {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .toggle-current b {
      color: var(--red-soft);
      font-size: 13px;
    }

    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 26px;
      background: linear-gradient(180deg, #ffffff, #fff4df);
      border: 1px solid rgba(255, 160, 80, 0.38);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.80), 0 18px 40px rgba(70,45,20,0.12);
    }

    .result h2 {
      margin: 0 0 12px;
      color: var(--text);
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .score-box {
      padding: 14px;
      border-radius: 18px;
      background: #fff8e8;
      border: 1px solid var(--line-soft);
    }

    .score-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .score-box b {
      color: var(--text);
      font-size: 17px;
      font-weight: 1000;
    }

    .final-score {
      margin: 12px 0 20px;
      color: transparent;
      background: linear-gradient(90deg, #25212c, var(--red), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      font-size: clamp(44px, 8vw, 78px);
      font-weight: 1000;
      letter-spacing: -0.08em;
      line-height: 1;
    }

    .summary,
    .copy-box {
      margin-top: 16px;
      padding: 18px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--soft);
      line-height: 1.75;
      white-space: pre-line;
    }

    .copy-box {
      border-style: dashed;
      color: var(--text);
      font-size: 14px;
    }

    .copy-btn {
      margin-top: 14px;
      background: linear-gradient(135deg, #25212c, #5d506d);
      color: #fffaf0;
      box-shadow: 0 12px 24px rgba(37,33,44,0.18);
    }

    .main-btn,
    .bottom-bar button,
    .copy-btn {
      width: 100%;
      padding: 17px;
      border: 0;
      border-radius: 20px;
      font-size: 17px;
      font-weight: 1000;
      cursor: pointer;
      transition: 0.18s;
      letter-spacing: -0.02em;
    }

    .main-btn,
    .bottom-bar button {
      color: #171725;
      background: linear-gradient(135deg, var(--yellow) 0%, #ff8c5a 48%, var(--red) 100%);
      box-shadow: 0 16px 34px rgba(255, 91, 95, 0.22), inset 0 1px 0 rgba(255,255,255,0.30);
    }

    .main-btn:hover,
    .bottom-bar button:hover,
    .copy-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255, 250, 240, 0.78);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(37,33,44,0.12);
    }

    .bottom-inner {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      align-items: center;
    }

    .live-score {
      height: 56px;
      display: grid;
      place-items: center;
      align-content: center;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid var(--line-soft);
      box-shadow: 0 8px 18px rgba(70,45,20,0.09);
    }

    .live-score span {
      display: block;
      color: var(--red-soft);
      font-size: 20px;
      font-weight: 1000;
      line-height: 1;
    }

    .live-score small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }

    @media (max-width: 720px) {
      body { padding: 14px 10px 104px; }
      .container { padding: 20px; border-radius: 22px; }
      .header { grid-template-columns: 1fr; gap: 16px; }
      .stamp { width: 108px; height: 108px; border-radius: 24px; }
      .score-grid { grid-template-columns: 1fr; }
      .field { min-height: auto; padding: 17px; }
      .field:hover { transform: none; }
      .field small { min-height: auto; }
      .toggle-labels { font-size: 10px; }
      .toggle-option { font-size: 12px; }
      .score-row { grid-template-columns: 1fr; }
      h1 { font-size: 42px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="content">
      <section class="header">
        <div>
          <div class="eyebrow">🎲 BOARDGAME RATING</div>
          <h1>오늘의<br /><span>게임 판정단</span></h1>
          <p class="desc">
            전략게임, 파티게임, 머더미스터리까지 한 판으로 기록합니다. 느낌으로 체크하면 점수와 총평이 자동으로 굴러갑니다.
          </p>
        </div>
        <div class="stamp">
          <div>
            <strong>/10</strong>
            <span>DICE SCORE</span>
          </div>
        </div>
      </section>

      <div class="guide">
        <strong>점수 변환 기준</strong><br />
        매우 그렇다 = 10점 · 그렇다 = 8점 · 보통이다 = 6점 · 아니다 = 4점 · 전혀 아니다 = 2점
      </div>

      <div class="game-name">
        <label for="gameName">게임명</label>
        <input type="text" id="gameName" placeholder="예: 듄 임페리움, 아르낙, 스플렌더, 머더미스터리" />
      </div>

      <div class="score-grid" id="scoreGrid"></div>

      <button class="main-btn" onclick="calculateScore(true)">주사위 굴려 평점 계산하기</button>

      <div class="result" id="result" style="display:none;">
        <h2>평가 결과</h2>
        <div class="score-row">
          <div class="score-box"><span>총합</span><b id="totalScore"></b></div>
          <div class="score-box"><span>평균</span><b id="averageScore"></b></div>
        </div>
        <div class="final-score" id="boardlifeScore"></div>
        <div class="summary" id="summaryText"></div>
        <div class="copy-box" id="copyText"></div>
        <button class="copy-btn" onclick="copyReview()">평가 내용 복사하기</button>
      </div>
    </div>
  </main>

  <nav class="bottom-bar" aria-label="계산 바로가기">
    <div class="bottom-inner">
      <div class="live-score"><span id="liveScore">9.1</span><small>현재평균</small></div>
      <button type="button" onclick="calculateScore(true)">평점 계산하기</button>
    </div>
  </nav>

  <script>
    const labels = { 10: "매우 그렇다", 8: "그렇다", 6: "보통이다", 4: "아니다", 2: "전혀 아니다" };
    const options = [2, 4, 6, 8, 10];
    const optionText = { 2: "전혀\n아니다", 4: "아니다", 6: "보통", 8: "그렇다", 10: "매우\n그렇다" };
    const fields = [
      { id: "fun", title: "🎯 재미 / 몰입감", desc: "플레이하는 동안 지루하지 않고 몰입이 잘 되는가?", defaultValue: 10 },
      { id: "decision", title: "🃏 선택의 만족감", desc: "전략, 추리, 대화, 연기 등 내가 한 선택이 의미 있게 느껴지는가?", defaultValue: 10 },
      { id: "flow", title: "⏱ 진행감 / 템포", desc: "게임이 늘어지지 않고 적당한 속도로 흘러가는가?", defaultValue: 10 },
      { id: "interaction", title: "🧩 상호작용 / 분위기", desc: "사람들과의 대화, 견제, 협력, 웃음, 긴장감이 잘 살아나는가?", defaultValue: 10 },
      { id: "theme", title: "🗺 테마 몰입도", desc: "게임의 콘셉트, 스토리, 역할, 분위기가 플레이 중 잘 느껴지는가?", defaultValue: 10 },
      { id: "fairness", title: "⚖ 납득감 / 공정성", desc: "운, 밸런스, 정보 차이, 탈락 등이 있어도 결과가 납득되는가?", defaultValue: 8 },
      { id: "replay", title: "🔁 재플레이 욕구", desc: "다시 하거나, 다른 사람에게 소개하거나, 비슷한 경험을 또 하고 싶은가?", defaultValue: 8 }
    ];

    const scores = Object.fromEntries(fields.map((field) => [field.id, field.defaultValue]));

    function renderFields() {
      const grid = document.getElementById("scoreGrid");
      grid.innerHTML = fields.map((field) => {
        const pos = options.indexOf(field.defaultValue);
        return `
          <div class="field">
            <div class="field-head">
              <label>${field.title}</label>
              <span class="score-preview" id="${field.id}Preview">${field.defaultValue}점</span>
            </div>
            <small>${field.desc}</small>
            <div class="toggle-wrap">
              <div class="toggle-labels" aria-hidden="true">
                <span>전혀<br />아니다</span><span>아니다</span><span>보통</span><span>그렇다</span><span>매우<br />그렇다</span>
              </div>
              <div class="toggle-control" id="${field.id}Toggle" role="radiogroup" aria-label="${field.title.replace(/^[^가-힣A-Za-z0-9]+\s*/, "")} 평가" style="--pos:${pos}">
                ${options.map((value) => `<button type="button" class="toggle-option ${value === field.defaultValue ? "active" : ""}" data-field="${field.id}" data-value="${value}" aria-pressed="${value === field.defaultValue}" onclick="selectScore(this)">${value}</button>`).join("")}
              </div>
              <div class="toggle-current"><span>낮음</span><b id="${field.id}Label">${labels[field.defaultValue]}</b><span>높음</span></div>
            </div>
          </div>`;
      }).join("");
    }

    function getScore(id) { return scores[id] || 0; }
    function getLabel(id) { return labels[getScore(id)]; }

    function selectScore(button) {
      const field = button.dataset.field;
      const value = Number(button.dataset.value);
      scores[field] = value;

      document.querySelectorAll(`.toggle-option[data-field="${field}"]`).forEach((option) => {
        const isActive = Number(option.dataset.value) === value;
        option.classList.toggle("active", isActive);
        option.setAttribute("aria-pressed", String(isActive));
      });

      const toggle = document.getElementById(`${field}Toggle`);
      toggle.style.setProperty("--pos", options.indexOf(value));
      updatePreviews();
      calculateScore(false);
    }

    function getScores() {
      return {
        fun: getScore("fun"),
        decision: getScore("decision"),
        flow: getScore("flow"),
        interaction: getScore("interaction"),
        theme: getScore("theme"),
        fairness: getScore("fairness"),
        replay: getScore("replay")
      };
    }

    function getAverage(currentScores) {
      const total = Object.values(currentScores).reduce((sum, score) => sum + score, 0);
      return { total, avg: total / fields.length };
    }

    function updatePreviews() {
      fields.forEach((field) => {
        document.getElementById(`${field.id}Preview`).textContent = `${getScore(field.id)}점`;
        document.getElementById(`${field.id}Label`).textContent = getLabel(field.id);
      });
      const { avg } = getAverage(getScores());
      document.getElementById("liveScore").textContent = avg.toFixed(1);
    }

    function getGradeText(avg) {
      if (avg >= 9) return "인생게임급. 장르와 상관없이 강하게 추천하고 싶은 게임.";
      if (avg >= 8) return "내 취향에 잘 맞는 수작. 다시 하고 싶거나 소개하고 싶은 게임.";
      if (avg >= 7) return "괜찮은 게임. 멤버와 상황이 맞으면 즐겁게 할 만함.";
      if (avg >= 6) return "나쁘진 않지만 살짝 애매함. 장르나 멤버를 조금 탐.";
      if (avg >= 5) return "보통 수준. 특별한 이유가 없으면 다시 꺼내진 않을 수 있음.";
      return "내 취향과는 거리가 큼.";
    }

    function getShortReview(currentScores, avg) {
      const strongPoints = [];
      const weakPoints = [];

      if (currentScores.fun >= 8) strongPoints.push("재미/몰입감");
      if (currentScores.decision >= 8) strongPoints.push("선택의 만족감");
      if (currentScores.flow >= 8) strongPoints.push("진행감/템포");
      if (currentScores.interaction >= 8) strongPoints.push("상호작용/분위기");
      if (currentScores.theme >= 8) strongPoints.push("테마 몰입도");
      if (currentScores.replay >= 8) strongPoints.push("재플레이 욕구");

      if (currentScores.fairness <= 6) weakPoints.push("납득감/공정성에서 약간의 아쉬움");
      if (currentScores.flow <= 6) weakPoints.push("템포 부담");
      if (currentScores.interaction <= 6) weakPoints.push("상호작용 부족");
      if (currentScores.theme <= 6) weakPoints.push("테마 몰입도 부족");

      let review = getGradeText(avg) + "\n\n";
      if (strongPoints.length > 0) review += `강점은 ${strongPoints.join(", ")}이며, 장르와 상관없이 좋은 경험을 주는 게임으로 보임.`;
      if (weakPoints.length > 0) review += ` 다만 ${weakPoints.join(", ")}은 감점 요소.`;
      return review;
    }

    function calculateScore(scrollToResult = false) {
      const gameName = document.getElementById("gameName").value.trim() || "미입력 게임";
      const currentScores = getScores();
      const { total, avg } = getAverage(currentScores);
      const finalScore = avg.toFixed(2);
      const review = getShortReview(currentScores, avg);

      document.getElementById("result").style.display = "block";
      document.getElementById("totalScore").textContent = `${total.toFixed(1)} / 70점`;
      document.getElementById("averageScore").textContent = `${avg.toFixed(2)} / 10점`;
      document.getElementById("boardlifeScore").textContent = `최종 평점: ${finalScore}점`;
      document.getElementById("summaryText").textContent = review;

      document.getElementById("copyText").textContent =
`${gameName} 평가

재미/몰입감: ${getLabel("fun")} (${currentScores.fun}/10)
선택의 만족감: ${getLabel("decision")} (${currentScores.decision}/10)
진행감/템포: ${getLabel("flow")} (${currentScores.flow}/10)
상호작용/분위기: ${getLabel("interaction")} (${currentScores.interaction}/10)
테마 몰입도: ${getLabel("theme")} (${currentScores.theme}/10)
납득감/공정성: ${getLabel("fairness")} (${currentScores.fairness}/10)
재플레이 욕구: ${getLabel("replay")} (${currentScores.replay}/10)

총합: ${total.toFixed(1)} / 70
평균: ${avg.toFixed(2)} / 10
최종 평점: ${finalScore}점

총평: ${review}`;

      if (scrollToResult) document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function copyReview() {
      const text = document.getElementById("copyText").textContent;
      try {
        await navigator.clipboard.writeText(text);
        alert("평가 내용을 복사했어.");
      } catch (error) {
        alert("복사가 안 되면 아래 박스 내용을 길게 눌러 직접 복사해줘.");
      }
    }

    renderFields();
    updatePreviews();
    calculateScore(false);
  </script>
</body>
</html>
